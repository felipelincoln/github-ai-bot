name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build
      - name: Verify the packaged artifact
        shell: bash
        run: |
          out="$(npm pack --dry-run 2>&1)"
          echo "$out"
          echo "$out" | grep -q 'dist/cli.js' || { echo "dist/cli.js missing from the package"; exit 1; }
          echo "$out" | grep -q 'dist/web/' || { echo "dist/web missing from the package"; exit 1; }
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
